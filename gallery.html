        <style>
            .material-symbols-outlined {

                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
                display: inline-block;
                vertical-align: middle;
            }
            .gallery-grid {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                gap: 24px;
            }
            .image-frame {
                position: relative;
                overflow: hidden;
                border-radius: 8px;
                border: 1px solid rgba(130, 116, 114, 0.1);
                background: #f2edea;
                transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .image-frame:hover {
                box-shadow: 0 20px 40px -15px rgba(39, 19, 16, 0.08);
                transform: translateY(-4px);
            }
            .image-frame img {
                transition: transform 0.8s scale(1.05);
            }
            .image-frame:hover img {
                transform: scale(1.05);
            }
